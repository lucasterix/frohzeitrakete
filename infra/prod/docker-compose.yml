x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16
    container_name: fzr_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - fzr_prod_net

  backend:
    build:
      context: ../../apps/backend
    container_name: fzr_prod_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks:
      - fzr_prod_net

  admin-web:
    build:
      context: ../../apps/admin-web
    container_name: fzr_prod_admin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging
    networks:
      - fzr_prod_net

  caddy:
    image: caddy:2
    container_name: fzr_prod_caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      admin-web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    logging: *default-logging
    networks:
      - fzr_prod_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  fzr_prod_net:
