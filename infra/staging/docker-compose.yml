services:
  postgres:
    image: postgres:16
    container_name: fzr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fzr_net

  backend:
    build:
      context: ../../apps/backend
    container_name: fzr_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - fzr_net

  admin-web:
    build:
      context: ../../apps/admin-web
    container_name: fzr_admin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - fzr_net

  caddy:
    image: caddy:2
    container_name: fzr_caddy
    restart: unless-stopped
    depends_on:
      - backend
      - admin-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - fzr_net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  fzr_net:
