services:
  postgres:
    image: postgres:16
    container_name: fzr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fzr_net

  backend:
    build:
      context: ../../apps/backend
    container_name: fzr_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    networks:
      - fzr_net

  admin-web:
    build:
      context: ../../apps/admin-web
    container_name: fzr_admin
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - fzr_net

volumes:
  postgres_data:

networks:
  fzr_net:
