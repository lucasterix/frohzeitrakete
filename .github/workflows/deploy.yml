name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 46.224.7.46
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/deploy/apps/frohzeitrakete
            git pull
            cd infra/staging

            # Alles komplett stoppen + aufräumen
            docker compose down --remove-orphans --volumes=false || true
            docker rm -f fzr_postgres fzr_backend fzr_admin fzr_caddy fzr_mobile_web 2>/dev/null || true
            docker container prune -f 2>/dev/null || true

            # Nur backend + admin-web bauen
            docker compose build backend admin-web

            # Migrations (one-shot Container)
            docker compose run --rm backend alembic upgrade head

            # Stack starten
            docker compose up -d
            sleep 10
            docker compose ps
