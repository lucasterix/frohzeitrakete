name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 46.224.7.46
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/deploy/apps/frohzeitrakete
            git pull
            cd infra/staging

            # 1. Backend-Image bauen (für den Migrations-Step).
            docker compose build backend

            # 2. Migrations als one-shot ausführen (keine Crash-Loop bei Failure –
            #    der Container existiert nach diesem Schritt nicht mehr).
            #    Wenn alembic upgrade fehlschlägt, schlägt der Workflow fehl
            #    und der laufende Backend-Container wird nicht angerührt.
            docker compose run --rm backend alembic upgrade head

            # 3. Stack hochziehen. --build sorgt dafür dass admin-web auch
            #    rebuilt wird wenn sich der Frontend-Code geändert hat.
            #    --wait blockiert bis alle Container healthcheck-grün sind.
            docker compose up -d --build --wait
